name: deviceservice

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${SQL_SA_PASSWORD:?SQL_SA_PASSWORD must be set}
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: DeviceService.API/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=DeviceServiceDb;User Id=sa;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True"
      Jwt__Key: ${JWT_KEY:?JWT_KEY must be set}
      Jwt__Issuer: DeviceServiceAPI
      Jwt__Audience: DeviceServiceApp
      Registration__ServiceCode: ${SERVICE_REGISTRATION_CODE:?SERVICE_REGISTRATION_CODE must be set}
      Database__ApplyMigrations: "true"
      ReverseProxy__TrustForwardedHeaders: "true"
      Https__Redirect: "false"
      Email__Host: ${SMTP_HOST:-}
      Email__Port: ${SMTP_PORT:-587}
      Email__UserName: ${SMTP_USERNAME:-}
      Email__Password: ${SMTP_PASSWORD:-}
      Email__FromAddress: ${SMTP_FROM_ADDRESS:-}
      Email__FromName: ${SMTP_FROM_NAME:-DeviceService}
      Email__EnableSsl: ${SMTP_ENABLE_SSL:-true}
      Email__PublicAppBaseUrl: ${PUBLIC_BASE_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api-keys:/home/app/.aspnet/DataProtection-Keys

  web:
    build:
      context: .
      dockerfile: DeviceService.Web/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiBaseUrl: http://api:8080/
      ReverseProxy__TrustForwardedHeaders: "true"
      Https__Redirect: "false"
    depends_on:
      - api
    volumes:
      - web-keys:/home/app/.aspnet/DataProtection-Keys

  proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  sql-data:
  api-keys:
  web-keys: